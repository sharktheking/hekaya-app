<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>مكتبة حكايه - المتجر</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg-color: #FDFCF8; --card-bg: #FFFFFF; --text-color: #1A1A1A;
            --primary: #D4AF37; --border-color: #F0E6D2;
            --gradient: linear-gradient(135deg, #D4AF37 0%, #FFE066 50%, #D4AF37 100%);
        }
        body.dark { --bg-color: #0D0D0D; --card-bg: #1A1A1A; --text-color: #F5F5F5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); color: var(--text-color); transition: all 0.3s; padding-bottom: 70px; }
        
        .startup-screen {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--gradient); z-index: 2000;
            display: flex; align-items: center; justify-content: center; flex-direction: column;
            animation: fadeOut 1.5s ease forwards; animation-delay: 1.5s;
        }
        @keyframes fadeOut { 0% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        .startup-logo { font-size: 80px; animation: bounce 1s ease infinite; }
        .startup-title { font-size: 28px; font-weight: bold; color: #0A0A0A; margin-top: 20px; text-align: center; }
        @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        
        .header { background: var(--card-bg); padding: 12px 16px; border-bottom: 2px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
        .logo-area h1 { font-size: 20px; background: var(--gradient); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .theme-toggle { background: var(--gradient); border: none; border-radius: 30px; padding: 6px 12px; cursor: pointer; font-size: 12px; font-weight: bold; color: #1A1A1A; }
        
        .categories-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 12px; }
        .category-card { text-align: center; cursor: pointer; padding: 10px; border-radius: 20px; background: var(--card-bg); border: 1px solid var(--border-color); }
        .category-icon { background: var(--gradient); border-radius: 50%; width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; margin: 0 auto 8px; }
        .category-icon i { font-size: 28px; color: #1A1A1A; }
        .category-name { font-size: 11px; color: var(--text-dim); font-weight: 500; }
        
        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 10px 16px; }
        .product-card { background: var(--card-bg); border-radius: 16px; padding: 12px; border: 1px solid var(--border-color); cursor: pointer; position: relative; }
        .product-image { font-size: 40px; text-align: center; }
        .product-title { font-size: 12px; font-weight: bold; text-align: center; margin: 8px 0; }
        .product-price { font-size: 13px; font-weight: bold; color: var(--primary); text-align: center; }
        .fav-btn { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.5); border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; }
        .fav-active { color: #E53935; background: white; }
        
        .cart-item { display: flex; align-items: center; justify-content: space-between; padding: 8px; border-bottom: 1px solid var(--border-color); }
        .cart-item-quantity { display: flex; align-items: center; gap: 10px; }
        .cart-qty-btn { background: var(--gradient); border: none; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card-bg); display: flex; justify-content: space-around; padding: 8px 12px; border-top: 1px solid var(--border-color); z-index: 100; }
        .nav-item { text-align: center; cursor: pointer; padding: 5px; border-radius: 30px; }
        .nav-item.active { background: var(--gradient); }
        .cart-icon { position: relative; }
        .badge { background: var(--primary); color: #1A1A1A; font-size: 9px; border-radius: 50%; width: 16px; height: 16px; display: inline-flex; align-items: center; justify-content: center; position: absolute; top: -5px; right: -8px; }
        
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .modal-content { background: var(--card-bg); border-radius: 28px; padding: 25px; width: 85%; max-width: 400px; border: 2px solid var(--primary); text-align: center; }
        .modal-input { width: 100%; padding: 12px; margin: 8px 0; background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 12px; }
        .modal-btn { background: var(--gradient); border: none; padding: 12px; border-radius: 30px; width: 100%; font-weight: bold; margin-top: 10px; cursor: pointer; }
        
        .toast { position: fixed; bottom: 80px; left: 20px; right: 20px; background: var(--gradient); padding: 12px; border-radius: 50px; text-align: center; z-index: 1000; animation: fadeOutToast 2.5s; font-weight: bold; }
        @keyframes fadeOutToast { 0% { opacity: 1; } 100% { opacity: 0; } }
        .empty-state { text-align: center; padding: 40px; color: var(--text-dim); }
        .back-btn { background: var(--gradient); border: none; border-radius: 40px; padding: 8px 16px; margin: 10px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
        .category-products-section { display: none; padding: 12px; }
        .category-products-section.active { display: block; }
        .section-title { display: flex; justify-content: space-between; padding: 15px 16px 5px; }
        .section-title h3 { color: var(--primary); font-size: 18px; }
    </style>
</head>
<body>

<div class="startup-screen" id="startupScreen">
    <div class="startup-logo">📚</div>
    <div class="startup-title">✨ مرحباً بك في مكتبة حكايه ✨</div>
</div>

<div class="header">
    <div class="logo-area"><h1>✨ مكتبة حكايه ✨</h1></div>
    <div class="theme-toggle" id="themeToggleBtn">🌙 ليلي</div>
</div>

<div class="categories-grid" id="categoriesGrid"></div>

<div id="homeContent">
    <div class="products-grid" id="productsGrid"></div>
</div>

<div id="favoritesContent" style="display: none;">
    <div class="products-grid" id="favoritesGrid"></div>
</div>

<div id="cartContent" style="display: none;">
    <div id="cartItemsGrid" class="cart-items-list"></div>
    <div style="padding: 12px; text-align: center;">
        <div class="cart-total" id="cartTotal" style="font-size: 18px; font-weight: bold; color: var(--primary); margin: 10px 0;"></div>
        <button class="modal-btn" onclick="checkout()" style="width: 90%;">💳 شراء الآن</button>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item active" data-tab="home"><i class="fas fa-home"></i><span>الرئيسية</span></div>
    <div class="nav-item" data-tab="favorites"><i class="fas fa-heart"></i><span>المفضلة</span></div>
    <div class="nav-item" data-tab="cart"><div class="cart-icon"><i class="fas fa-shopping-cart"></i><span class="badge" id="cartBadge" style="display:none;">0</span></div><span>السلة</span></div>
</div>

<!-- Order Info Modal -->
<div id="orderModal" class="modal" style="display: none;">
    <div class="modal-content">
        <h3>📝 معلومات الطلب</h3>
        <input type="text" id="customerName" class="modal-input" placeholder="الاسم الكامل *">
        <input type="tel" id="customerPhone" class="modal-input" placeholder="رقم الهاتف *">
        <input type="text" id="customerAddress" class="modal-input" placeholder="العنوان *">
        <div id="orderError" style="color: #E53935; font-size: 12px; margin-top: 5px; display: none;"></div>
        <button class="modal-btn" onclick="submitOrder()">تأكيد الطلب</button>
        <button class="modal-btn modal-close" onclick="closeOrderModal()">إلغاء</button>
    </div>
</div>

<script>
    // ======================= Supabase Configuration =======================
    const SUPABASE_URL = "https://akwabeejinxdrwaatekr.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_sqLCLzEK2xWNOGqeQg1Ovw_xeWRpClz";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const WHATSAPP_NUMBER = "9647757777566";
    
    // الأقسام
    const categories = [
        { id: "stationery", name: "القرطاسية", icon: "fa-book", iconEmoji: "📚" },
        { id: "toys", name: "الألعاب", icon: "fa-gamepad", iconEmoji: "🎮" },
        { id: "gifts", name: "الهدايا", icon: "fa-gift", iconEmoji: "🎁" },
        { id: "electronics", name: "الإلكترونيات", icon: "fa-mobile-alt", iconEmoji: "📱" },
        { id: "school", name: "المستلزمات المدرسية", icon: "fa-pencil-alt", iconEmoji: "✏️" },
        { id: "books", name: "الكتب", icon: "fa-book-open", iconEmoji: "📖" },
        { id: "kitchen", name: "المطارات والأكواب", icon: "fa-mug-hot", iconEmoji: "☕" },
        { id: "sports", name: "المعدات الرياضية", icon: "fa-futbol", iconEmoji: "⚽" }
    ];
    
    let products = [];
    let cart = [];
    let favorites = [];
    let currentTab = 'home';
    let defaultQuantity = 1;
    let currentCategory = null;
    
    // ======================= Load Products from Supabase =======================
    async function loadProducts() {
        const { data, error } = await supabase
            .from('products')
            .select('*');
        
        if (error) {
            console.error('Error loading products:', error);
            showToast('❌ فشل تحميل المنتجات');
            // بيانات افتراضية في حالة الخطأ
            products = [
                { id: 1, name: "دفتر ملاحظات فاخر", price: 3000, icon: "📓", category: "stationery" },
                { id: 2, name: "قلم حبر ذهبي", price: 1500, icon: "✒️", category: "stationery" },
                { id: 3, name: "سكوشي فاخر", price: 5000, old_price: 7500, icon: "🧸", category: "toys" },
                { id: 4, name: "شاحن سريع 33W", price: 25000, old_price: 35000, icon: "⚡", category: "electronics" }
            ];
        } else {
            products = data;
        }
        renderAll();
    }
    
    // ======================= Local Storage =======================
    function loadUserData() {
        const savedCart = localStorage.getItem('hekaya_cart');
        const savedFav = localStorage.getItem('hekaya_favorites');
        if (savedCart) cart = JSON.parse(savedCart);
        if (savedFav) favorites = JSON.parse(savedFav);
        updateCartTotal();
    }
    
    function saveUserData() {
        localStorage.setItem('hekaya_cart', JSON.stringify(cart));
        localStorage.setItem('hekaya_favorites', JSON.stringify(favorites));
    }
    
    // ======================= Cart Functions =======================
    function addToCart(productId) {
        const product = products.find(p => p.id === productId);
        const existingItem = cart.find(item => item.id === productId);
        
        if (existingItem) {
            existingItem.quantity += defaultQuantity;
        } else {
            cart.push({ id: product.id, name: product.name, price: product.price, quantity: defaultQuantity });
        }
        
        saveUserData();
        updateCartTotal();
        if (currentTab === 'cart') renderCartItems();
        showToast(`✅ تم إضافة ${product.name} إلى السلة`);
    }
    
    function updateCartItemQuantity(productId, delta) {
        const item = cart.find(item => item.id === productId);
        if (item) {
            item.quantity += delta;
            if (item.quantity <= 0) {
                cart = cart.filter(i => i.id !== productId);
            }
            saveUserData();
            updateCartTotal();
            if (currentTab === 'cart') renderCartItems();
        }
    }
    
    function removeFromCart(productId) {
        cart = cart.filter(item => item.id !== productId);
        saveUserData();
        updateCartTotal();
        if (currentTab === 'cart') renderCartItems();
        showToast(`🗑️ تم إزالة المنتج من السلة`);
    }
    
    function toggleFavorite(productId) {
        if (favorites.includes(productId)) {
            favorites = favorites.filter(id => id !== productId);
            showToast(`💔 تم إزالة من المفضلة`);
        } else {
            favorites.push(productId);
            showToast(`❤️ تمت إضافة إلى المفضلة`);
        }
        saveUserData();
        renderAll();
    }
    
    function updateCartTotal() {
        const total = document.getElementById('cartTotal');
        const badge = document.getElementById('cartBadge');
        const itemCount = cart.reduce((sum, item) => sum + item.quantity, 0);
        const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        
        if (total) total.innerHTML = `المجموع: ${totalPrice.toLocaleString()} د.ع`;
        if (itemCount > 0) { badge.style.display = 'inline-flex'; badge.innerText = itemCount; }
        else badge.style.display = 'none';
    }
    
    // ======================= Checkout =======================
    function checkout() {
        if (cart.length === 0) {
            showToast('🛒 السلة فارغة');
            return;
        }
        document.getElementById('orderModal').style.display = 'flex';
    }
    
    async function submitOrder() {
        const customerName = document.getElementById('customerName').value.trim();
        const customerPhone = document.getElementById('customerPhone').value.trim();
        const customerAddress = document.getElementById('customerAddress').value.trim();
        
        if (!customerName || !customerPhone || !customerAddress) {
            document.getElementById('orderError').innerText = 'الرجاء ملء جميع الحقول';
            document.getElementById('orderError').style.display = 'block';
            return;
        }
        
        document.getElementById('orderError').style.display = 'none';
        showToast('🔄 جاري معالجة الطلب...');
        
        const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        
        const itemsList = [];
        for (const item of cart) {
            const product = products.find(p => p.id === item.id);
            for (let i = 0; i < item.quantity; i++) {
                itemsList.push({ id: item.id, name: item.name, price: item.price });
            }
        }
        
        const order = {
            order_number: `ORD-${Date.now()}`,
            customer_name: customerName,
            customer_email: '',
            customer_phone: customerPhone,
            customer_address: customerAddress,
            total: totalPrice,
            status: 'جديد',
            items: itemsList,
            created_at: new Date()
        };
        
        const { error } = await supabase.from('orders').insert([order]);
        
        if (!error) {
            // Clear cart
            cart = [];
            saveUserData();
            updateCartTotal();
            if (currentTab === 'cart') renderCartItems();
            closeOrderModal();
            showToast(`✅ تم إرسال الطلب بنجاح! رقم الطلب: ${order.order_number}`);
            
            // Send to WhatsApp
            let itemsText = "";
            for (const item of cartSnapshot) {
                const product = products.find(p => p.id === item.id);
                const itemTotal = product.price * item.quantity;
                itemsText += `• ${product.name} x${item.quantity} = ${itemTotal.toLocaleString()} د.ع\n`;
            }
            
            const msg = encodeURIComponent(`🛒 طلب جديد\n👤 ${customerName}\n📞 ${customerPhone}\n📍 ${customerAddress}\n\n📋 المنتجات:\n${itemsText}\n💰 المجموع: ${totalPrice.toLocaleString()} د.ع`);
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`, '_blank');
            
            document.getElementById('customerName').value = '';
            document.getElementById('customerPhone').value = '';
            document.getElementById('customerAddress').value = '';
        } else {
            showToast('❌ فشل إرسال الطلب: ' + error.message);
        }
    }
    
    let cartSnapshot = [];
    function closeOrderModal() { document.getElementById('orderModal').style.display = 'none'; }
    
    // ======================= Render Functions =======================
    function renderCategories() {
        const container = document.getElementById('categoriesGrid');
        container.innerHTML = categories.map(cat => `
            <div class="category-card" onclick="showCategoryProducts('${cat.id}', '${cat.name}')">
                <div class="category-icon"><i class="fas ${cat.icon}"></i></div>
                <div class="category-name">${cat.name}</div>
            </div>
        `).join('');
    }
    
    function showCategoryProducts(categoryId, categoryName) {
        currentCategory = categoryId;
        const filteredProducts = products.filter(p => p.category === categoryId);
        
        document.getElementById('homeContent').style.display = 'none';
        document.getElementById('favoritesContent').style.display = 'none';
        document.getElementById('cartContent').style.display = 'none';
        document.getElementById('categoryProductsSection').classList.add('active');
        document.getElementById('categoryTitle').innerHTML = `${getCategoryIcon(categoryId)} ${categoryName}`;
        
        const container = document.getElementById('categoryProductsGrid');
        if (filteredProducts.length === 0) {
            container.innerHTML = '<div class="empty-state">لا توجد منتجات في هذا القسم</div>';
            return;
        }
        container.innerHTML = filteredProducts.map(p => `
            <div class="product-card" onclick="showProductDetail(${p.id})">
                <button class="fav-btn ${favorites.includes(p.id) ? 'fav-active' : ''}" onclick="event.stopPropagation(); toggleFavorite(${p.id})">
                    <i class="fas fa-heart"></i>
                </button>
                <div class="product-image">${p.icon}</div>
                <div class="product-title">${p.name}</div>
                <div class="product-price">${p.price.toLocaleString()} د.ع</div>
                <button class="product-action-btn" onclick="event.stopPropagation(); addToCart(${p.id})" style="background: var(--gradient); border: none; border-radius: 20px; padding: 5px; margin-top: 8px; width: 100%; cursor: pointer;">🛒 أضف للسلة</button>
            </div>
        `).join('');
    }
    
    function getCategoryIcon(categoryId) {
        const cat = categories.find(c => c.id === categoryId);
        return cat ? cat.iconEmoji : '📦';
    }
    
    function backToHome() {
        document.getElementById('homeContent').style.display = 'block';
        document.getElementById('categoryProductsSection').classList.remove('active');
        currentCategory = null;
        renderAll();
    }
    
    function renderAll() {
        const container = document.getElementById('productsGrid');
        container.innerHTML = products.map(product => `
            <div class="product-card" onclick="showProductDetail(${product.id})">
                <button class="fav-btn ${favorites.includes(product.id) ? 'fav-active' : ''}" onclick="event.stopPropagation(); toggleFavorite(${product.id})">
                    <i class="fas fa-heart"></i>
                </button>
                <div class="product-image">${product.icon}</div>
                <div class="product-title">${product.name}</div>
                <div class="product-price">${product.price.toLocaleString()} د.ع</div>
                <button class="product-action-btn" onclick="event.stopPropagation(); addToCart(${product.id})" style="background: var(--gradient); border: none; border-radius: 20px; padding: 5px; margin-top: 8px; width: 100%; cursor: pointer;">🛒 أضف للسلة</button>
            </div>
        `).join('');
        
        if (currentTab === 'favorites') renderFavorites();
        if (currentTab === 'cart') renderCartItems();
    }
    
    function renderFavorites() {
        const container = document.getElementById('favoritesGrid');
        const favProducts = products.filter(p => favorites.includes(p.id));
        if (favProducts.length === 0) {
            container.innerHTML = '<div class="empty-state">❤️ لا توجد منتجات مفضلة</div>';
            return;
        }
        container.innerHTML = favProducts.map(product => `
            <div class="product-card" onclick="showProductDetail(${product.id})">
                <button class="fav-btn fav-active" onclick="event.stopPropagation(); toggleFavorite(${product.id})">
                    <i class="fas fa-heart"></i>
                </button>
                <div class="product-image">${product.icon}</div>
                <div class="product-title">${product.name}</div>
                <div class="product-price">${product.price.toLocaleString()} د.ع</div>
                <button class="product-action-btn" onclick="event.stopPropagation(); addToCart(${product.id})" style="background: var(--gradient); border: none; border-radius: 20px; padding: 5px; margin-top: 8px; width: 100%; cursor: pointer;">🛒 أضف للسلة</button>
            </div>
        `).join('');
    }
    
    function renderCartItems() {
        const container = document.getElementById('cartItemsGrid');
        if (cart.length === 0) {
            container.innerHTML = '<div class="empty-state">🛒 السلة فارغة</div>';
            updateCartTotal();
            return;
        }
        container.innerHTML = cart.map(item => {
            const p = products.find(p => p.id === item.id);
            return `
                <div class="cart-item">
                    <div>
                        <div>${p.icon} ${p.name}</div>
                        <div class="cart-item-price">${(p.price * item.quantity).toLocaleString()} د.ع</div>
                    </div>
                    <div class="cart-item-quantity">
                        <button class="cart-qty-btn" onclick="updateCartItemQuantity(${item.id}, -1)">-</button>
                        <span style="min-width: 30px; text-align: center;">${item.quantity}</span>
                        <button class="cart-qty-btn" onclick="updateCartItemQuantity(${item.id}, 1)">+</button>
                        <button class="cart-qty-btn" style="background:#E53935;" onclick="removeFromCart(${item.id})">🗑️</button>
                    </div>
                </div>
            `;
        }).join('');
        updateCartTotal();
    }
    
    function showProductDetail(id) {
        const p = products.find(p => p.id === id);
        alert(`${p.name}\nالسعر: ${p.price.toLocaleString()} د.ع`);
    }
    
    // ======================= UI Functions =======================
    function setActiveTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.nav-item').forEach(item => {
            if (item.dataset.tab === tab) item.classList.add('active');
            else item.classList.remove('active');
        });
        document.getElementById('homeContent').style.display = 'none';
        document.getElementById('favoritesContent').style.display = 'none';
        document.getElementById('cartContent').style.display = 'none';
        document.getElementById('categoryProductsSection').classList.remove('active');
        
        if (tab === 'home') {
            document.getElementById('homeContent').style.display = 'block';
            renderAll();
        } else if (tab === 'favorites') {
            document.getElementById('favoritesContent').style.display = 'block';
            renderFavorites();
        } else if (tab === 'cart') {
            document.getElementById('cartContent').style.display = 'block';
            renderCartItems();
        }
    }
    
    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }
    
    function changeDefaultQty(delta) {
        defaultQuantity = Math.max(1, defaultQuantity + delta);
        localStorage.setItem('default_quantity', defaultQuantity);
    }
    
    function loadDefaultQty() {
        const saved = localStorage.getItem('default_quantity');
        if (saved) defaultQuantity = parseInt(saved);
    }
    
    function showAllCategories() {
        showToast("📂 جميع الأقسام متاحة");
    }
    
    // Theme
    function loadTheme() {
        if (localStorage.getItem('hekaya_theme') === 'dark') {
            document.body.classList.add('dark');
            document.getElementById('themeToggleBtn').innerHTML = '☀️ نهاري';
        }
    }
    function toggleTheme() {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        localStorage.setItem('hekaya_theme', isDark ? 'dark' : 'light');
        document.getElementById('themeToggleBtn').innerHTML = isDark ? '☀️ نهاري' : '🌙 ليلي';
    }
    
    // Search
    document.getElementById('searchInput')?.addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        if (term) {
            const found = products.filter(p => p.name.toLowerCase().includes(term));
            showToast(`🔍 تم العثور على ${found.length} منتج`);
        }
    });
    
    // Slider
    let currentSlide = 0;
    const sliderWrapper = document.getElementById('sliderWrapper');
    const slides = document.querySelectorAll('.slide');
    
    function initSlider() {
        if (!slides.length) return;
        for (let i = 0; i < slides.length; i++) {
            const dot = document.createElement('div');
            dot.classList.add('dot');
            dot.onclick = () => goToSlide(i);
            document.getElementById('sliderDots').appendChild(dot);
        }
        goToSlide(0);
        setInterval(() => goToSlide(currentSlide + 1), 5000);
        let startX;
        sliderWrapper.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; });
        sliderWrapper.addEventListener('touchend', (e) => {
            let diff = e.changedTouches[0].clientX - startX;
            if (Math.abs(diff) > 50) goToSlide(diff > 0 ? currentSlide - 1 : currentSlide + 1);
        });
    }
    
    function goToSlide(index) {
        currentSlide = (index + slides.length) % slides.length;
        sliderWrapper.style.transform = `translateX(-${currentSlide * 100}%)`;
        document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === currentSlide));
    }
    
    // Event Listeners
    document.querySelectorAll('.nav-item').forEach(item => item.addEventListener('click', () => setActiveTab(item.dataset.tab)));
    document.getElementById('themeToggleBtn').onclick = toggleTheme;
    
    window.addToCart = addToCart;
    window.checkout = checkout;
    window.submitOrder = submitOrder;
    window.closeOrderModal = closeOrderModal;
    window.setActiveTab = setActiveTab;
    window.toggleFavorite = toggleFavorite;
    window.updateCartItemQuantity = updateCartItemQuantity;
    window.removeFromCart = removeFromCart;
    window.changeDefaultQty = changeDefaultQty;
    window.showCategoryProducts = showCategoryProducts;
    window.backToHome = backToHome;
    window.showAllCategories = showAllCategories;
    window.showProductDetail = showProductDetail;
    
    // Initialize
    async function init() {
        loadDefaultQty();
        loadTheme();
        renderCategories();
        await loadProducts();
        loadUserData();
        initSlider();
        setActiveTab('home');
        
        setTimeout(() => {
            const startup = document.getElementById('startupScreen');
            if (startup) startup.remove();
        }, 2500);
    }
    
    init();
</script>
</body>
</html>
