<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#0A0A0A">
    <title>مكتبة حكايه - دليل واقيات الشاشة</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0A0A0A;
            color: #FFFFFF;
            padding-bottom: 20px;
        }

        .header {
            background: linear-gradient(135deg, #0A0A0A 0%, #1A1A1A 100%);
            padding: 20px 16px;
            text-align: center;
            border-bottom: 2px solid #FFD700;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 28px;
            color: #FFD700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .app-logo {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .last-updated {
            font-size: 10px;
            color: #888;
            margin-top: 5px;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            padding: 12px 16px;
            background: #111111;
            margin: 10px 12px;
            border-radius: 25px;
            font-size: 12px;
        }

        .stat {
            background: #1A1A1A;
            padding: 8px 16px;
            border-radius: 20px;
            color: #FFD700;
        }

        .search-container {
            padding: 0 12px 15px 12px;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: #1A1A1A;
            border-radius: 30px;
            padding: 8px 16px;
            border: 1px solid #333;
            transition: all 0.3s ease;
        }

        .search-box:focus-within {
            border-color: #FFD700;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
        }

        .search-icon {
            font-size: 20px;
            margin-left: 10px;
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
            font-family: inherit;
        }

        .search-input::placeholder {
            color: #666;
        }

        .clear-btn {
            background: #333;
            border: none;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .refresh-btn {
            background: #333;
            border: none;
            color: #FFD700;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            margin-right: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brands-container {
            padding: 0 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .brand-card {
            background: #1A1A1A;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .brand-header {
            display: flex;
            align-items: center;
            padding: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .brand-header:active {
            background: #252525;
        }

        .brand-icon {
            width: 50px;
            height: 50px;
            border-radius: 25px;
            object-fit: cover;
            margin-left: 12px;
        }

        .brand-icon-emoji {
            font-size: 40px;
            width: 50px;
            text-align: center;
        }

        .brand-info {
            flex: 1;
        }

        .brand-name {
            font-size: 18px;
            font-weight: bold;
        }

        .brand-compat {
            font-size: 10px;
            color: #888;
            margin-top: 4px;
        }

        .brand-arrow {
            font-size: 22px;
            color: #FFD700;
            transition: transform 0.3s ease;
        }

        .brand-arrow.open {
            transform: rotate(180deg);
        }

        .brand-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out;
            background: #0F0F0F;
        }

        .brand-content.open {
            max-height: 3000px;
            transition: max-height 0.6s ease-in;
        }

        .series-card {
            background: #141414;
            margin: 8px 12px 12px 12px;
            border-radius: 15px;
            overflow: hidden;
        }

        .series-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 15px;
            cursor: pointer;
            background: #1A1A1A;
            flex-wrap: wrap;
            gap: 5px;
        }

        .series-name {
            font-size: 13px;
            font-weight: bold;
            color: #FFD700;
        }

        .series-compat {
            font-size: 9px;
            color: #888;
            flex: 1;
            text-align: center;
        }

        .series-arrow {
            font-size: 16px;
            color: #FFD700;
            transition: transform 0.3s;
        }

        .models-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            padding: 12px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        .models-grid.open {
            max-height: 2000px;
        }

        .model-btn {
            background: #252525;
            border: none;
            color: white;
            padding: 8px 4px;
            border-radius: 10px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .model-btn:active {
            background: #FFD700;
            color: #0A0A0A;
            transform: scale(0.97);
        }

        .footer {
            text-align: center;
            padding: 20px;
            font-size: 11px;
            color: #555;
            border-top: 1px solid #1A1A1A;
            margin-top: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #FFD700;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .online-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1A1A1A;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 200;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4CAF50;
        }

        .status-dot.offline {
            background: #FF4444;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>
        <img id="appLogo" class="app-logo" src="https://via.placeholder.com/40/FFD700/0A0A0A?text=ح" alt="logo">
        <span>مكتبة حكايه</span>
    </h1>
    <p>دليل واقيات الشاشة المتوافقة - محدث باستمرار</p>
    <div class="last-updated" id="lastUpdated">جاري التحميل...</div>
</div>

<div class="stats-bar" id="statsBar">
    <div class="stat" id="brandsCount">🏷️ 0 علامة</div>
    <div class="stat" id="modelsCount">📱 0 موديل</div>
</div>

<div class="search-container">
    <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="searchInput" placeholder="ابحث عن موديل...">
        <button class="refresh-btn" id="refreshBtn">⟳</button>
        <button class="clear-btn" id="clearBtn">✖</button>
    </div>
</div>

<div class="brands-container" id="brandsContainer">
    <div class="loading">⏳ جاري التحميل...</div>
</div>

<div class="footer">
    <p>✨ اضغط على أي علامة لعرض الموديلات المتوافقة ✨</p>
    <p style="margin-top: 8px;">✅ نفس حجم الشاشة = واقي واحد يناسب جميع الموديلات في نفس المجموعة</p>
</div>

<div class="online-status" id="onlineStatus">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">جاري الاتصال...</span>
</div>

<script>
    // Configuration - CHANGE THESE TO YOUR GITHUB REPO
    const GITHUB_USERNAME = 'YOUR_USERNAME';
    const REPO_NAME = 'hekaya-app';
    const DATA_URL = `https://${GITHUB_USERNAME}.github.io/${REPO_NAME}/data/brands.json`;
    const CONFIG_URL = `https://${GITHUB_USERNAME}.github.io/${REPO_NAME}/config.json`;
    
    let brandsData = {};
    let appConfig = {};
    
    // Load configuration first
    async function loadConfig() {
        try {
            const response = await fetch(CONFIG_URL + '?t=' + Date.now());
            if (response.ok) {
                appConfig = await response.json();
                // Update app logo if available
                if (appConfig.appLogo) {
                    const logoImg = document.getElementById('appLogo');
                    logoImg.src = appConfig.appLogo;
                }
                if (appConfig.lastUpdate) {
                    document.getElementById('lastUpdated').innerHTML = `📅 آخر تحديث: ${appConfig.lastUpdate}`;
                }
            }
        } catch (e) {
            console.log('Config load error:', e);
        }
    }
    
    // Load brands data from GitHub
    async function loadBrands() {
        try {
            updateOnlineStatus(true, 'جاري التحميل...');
            
            const response = await fetch(DATA_URL + '?t=' + Date.now());
            if (!response.ok) {
                throw new Error('Network response was not ok');
            }
            brandsData = await response.json();
            
            updateOnlineStatus(true, 'متصل');
            renderBrands();
            updateStats();
            
        } catch (error) {
            console.error('Error loading brands:', error);
            updateOnlineStatus(false, 'غير متصل - بيانات محلية');
            
            // Try local cache
            const cached = localStorage.getItem('hekaya_brands_cache');
            if (cached) {
                brandsData = JSON.parse(cached);
                renderBrands();
                updateStats();
                showToast('⚠️ عرض بيانات مخزنة مؤقتاً');
            } else {
                document.getElementById('brandsContainer').innerHTML = '<div class="loading">❌ فشل التحميل. تأكد من اتصالك بالإنترنت</div>';
            }
        }
    }
    
    // Cache data locally
    function cacheData() {
        if (brandsData && Object.keys(brandsData).length > 0) {
            localStorage.setItem('hekaya_brands_cache', JSON.stringify(brandsData));
            localStorage.setItem('hekaya_cache_time', Date.now().toString());
        }
    }
    
    // Update online status indicator
    function updateOnlineStatus(isOnline, message) {
        const dot = document.getElementById('statusDot');
        const text = document.getElementById('statusText');
        
        if (isOnline) {
            dot.className = 'status-dot';
            text.textContent = message;
        } else {
            dot.className = 'status-dot offline';
            text.textContent = message;
        }
    }
    
    // Show toast message
    function showToast(message) {
        const toast = document.createElement('div');
        toast.style.cssText = `
            position: fixed;
            bottom: 80px;
            left: 20px;
            right: 20px;
            background: #333;
            color: #FFD700;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        `;
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    // Update statistics
    function updateStats() {
        let totalBrands = Object.keys(brandsData).length;
        let totalModels = 0;
        for (let brand in brandsData) {
            for (let series in brandsData[brand].series) {
                totalModels += brandsData[brand].series[series].models.length;
            }
        }
        document.getElementById('brandsCount').innerHTML = `🏷️ ${totalBrands} علامة`;
        document.getElementById('modelsCount').innerHTML = `📱 ${totalModels}+ موديل`;
        
        // Save to cache
        cacheData();
    }
    
    // Render brands
    const container = document.getElementById('brandsContainer');
    
    function renderBrands(filterText = '') {
        container.innerHTML = '';
        const filterLower = filterText.toLowerCase();
        let hasResults = false;
        
        for (let [brandName, brandData] of Object.entries(brandsData)) {
            let brandMatches = false;
            let filteredSeries = {};
            
            if (filterLower) {
                for (let [seriesName, seriesData] of Object.entries(brandData.series)) {
                    const matchingModels = seriesData.models.filter(m => m.toLowerCase().includes(filterLower));
                    if (matchingModels.length > 0) {
                        brandMatches = true;
                        filteredSeries[seriesName] = { ...seriesData, models: matchingModels };
                    }
                }
            } else {
                brandMatches = true;
                filteredSeries = brandData.series;
            }
            
            if (!brandMatches) continue;
            hasResults = true;
            
            const brandCard = document.createElement('div');
            brandCard.className = 'brand-card';
            
            const brandHeader = document.createElement('div');
            brandHeader.className = 'brand-header';
            
            // Use image logo if available, otherwise emoji
            const iconHtml = brandData.logoUrl ? 
                `<img class="brand-icon" src="${brandData.logoUrl}" alt="${brandName}">` :
                `<div class="brand-icon-emoji" style="color: ${brandData.color}">${brandData.logo}</div>`;
            
            brandHeader.innerHTML = `
                ${iconHtml}
                <div class="brand-info">
                    <div class="brand-name" style="color: ${brandData.color}">${brandName}</div>
                    <div class="brand-compat">${Object.keys(filteredSeries).length} مجموعة | اضغط للعرض</div>
                </div>
                <div class="brand-arrow">▼</div>
            `;
            
            const brandContent = document.createElement('div');
            brandContent.className = 'brand-content';
            
            for (let [seriesName, seriesData] of Object.entries(filteredSeries)) {
                const seriesCard = document.createElement('div');
                seriesCard.className = 'series-card';
                
                const seriesHeader = document.createElement('div');
                seriesHeader.className = 'series-header';
                seriesHeader.innerHTML = `
                    <div class="series-name">📐 ${seriesName}</div>
                    <div class="series-compat">🤝 ${seriesData.compatible[0]}</div>
                    <div class="series-arrow">▼</div>
                `;
                
                const modelsGrid = document.createElement('div');
                modelsGrid.className = 'models-grid';
                
                seriesData.models.forEach(model => {
                    const modelBtn = document.createElement('button');
                    modelBtn.className = 'model-btn';
                    modelBtn.textContent = model;
                    modelBtn.onclick = () => showModelInfo(model, seriesData.compatible);
                    modelsGrid.appendChild(modelBtn);
                });
                
                seriesCard.appendChild(seriesHeader);
                seriesCard.appendChild(modelsGrid);
                brandContent.appendChild(seriesCard);
                
                let seriesOpen = false;
                seriesHeader.onclick = (e) => {
                    e.stopPropagation();
                    const arrow = seriesHeader.querySelector('.series-arrow');
                    seriesOpen = !seriesOpen;
                    if (seriesOpen) {
                        modelsGrid.classList.add('open');
                        arrow.classList.add('open');
                        modelsGrid.style.maxHeight = modelsGrid.scrollHeight + 'px';
                    } else {
                        modelsGrid.classList.remove('open');
                        arrow.classList.remove('open');
                        modelsGrid.style.maxHeight = '0';
                    }
                };
            }
            
            brandCard.appendChild(brandHeader);
            brandCard.appendChild(brandContent);
            container.appendChild(brandCard);
            
            let brandOpen = false;
            brandHeader.onclick = () => {
                const arrow = brandHeader.querySelector('.brand-arrow');
                brandOpen = !brandOpen;
                if (brandOpen) {
                    brandContent.classList.add('open');
                    arrow.classList.add('open');
                } else {
                    brandContent.classList.remove('open');
                    arrow.classList.remove('open');
                }
            };
        }
        
        if (!hasResults && filterText) {
            container.innerHTML = '<div class="no-results">🔍 لا توجد نتائج لـ "' + filterText + '"</div>';
        }
    }
    
    // Show model info
    function showModelInfo(model, compatible) {
        const modal = document.createElement('div');
        modal.style.cssText = `
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9); display: flex; align-items: center;
            justify-content: center; z-index: 1000; animation: fadeIn 0.2s ease;
        `;
        
        const modalContent = document.createElement('div');
        modalContent.style.cssText = `
            background: #1A1A1A; border-radius: 25px; padding: 20px;
            width: 85%; max-width: 320px; text-align: center;
            border: 2px solid #FFD700; animation: slideUp 0.3s ease;
        `;
        
        modalContent.innerHTML = `
            <div style="font-size: 48px; margin-bottom: 10px;">📱</div>
            <h2 style="color: #FFD700; margin-bottom: 15px; font-size: 18px;">${model}</h2>
            <div style="background: #252525; padding: 12px; border-radius: 15px; margin-bottom: 15px; text-align: right;">
                <p style="margin-bottom: 8px;"><strong style="color: #FFD700;">✅ واقي الشاشة متوافق مع:</strong></p>
                <ul style="list-style: none; padding-right: 0;">
                    ${compatible.map(c => `<li style="margin: 6px 0;">• ${c}</li>`).join('')}
                </ul>
                <p style="margin-top: 10px; font-size: 11px; color: #888;">💡 نفس حجم الشاشة = واقي واحد يناسب جميع الموديلات في نفس المجموعة</p>
            </div>
            <button id="closeModalBtn" style="background: #FFD700; border: none; padding: 10px 20px;
                border-radius: 30px; font-size: 14px; font-weight: bold; color: #0A0A0A;
                cursor: pointer; width: 100%;">إغلاق</button>
        `;
        
        modal.appendChild(modalContent);
        document.body.appendChild(modal);
        
        const closeModal = () => modal.remove();
        document.getElementById('closeModalBtn').onclick = closeModal;
        modal.onclick = (e) => { if (e.target === modal) closeModal(); };
    }
    
    // Search functionality
    const searchInput = document.getElementById('searchInput');
    const clearBtn = document.getElementById('clearBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    
    searchInput.addEventListener('input', (e) => {
        const value = e.target.value;
        if (value) {
            clearBtn.style.display = 'flex';
        } else {
            clearBtn.style.display = 'none';
        }
        renderBrands(value);
    });
    
    clearBtn.addEventListener('click', () => {
        searchInput.value = '';
        clearBtn.style.display = 'none';
        renderBrands('');
        searchInput.focus();
    });
    
    refreshBtn.addEventListener('click', () => {
        loadBrands();
        loadConfig();
        showToast('🔄 جاري تحديث البيانات...');
    });
    
    // Initialize
    loadConfig();
    loadBrands();
</script>
</body>
</html>
