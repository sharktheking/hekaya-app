<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>مكتبة حكايه - المتجر</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg-color: #FDFCF8; --card-bg: #FFFFFF; --text-color: #1A1A1A; --text-dim: #6B6B6B;
            --primary: #D4AF37; --border-color: #F0E6D2;
            --gradient: linear-gradient(135deg, #D4AF37 0%, #FFE066 50%, #D4AF37 100%);
        }
        body.dark { --bg-color: #0D0D0D; --card-bg: #1A1A1A; --text-color: #F5F5F5; --border-color: #2A2A2A; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-color); color: var(--text-color); transition: all 0.3s; padding-bottom: 70px; }
        
        .header { background: var(--card-bg); padding: 12px 16px; border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .logo-area h1 { font-size: 20px; background: var(--gradient); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .theme-toggle { background: var(--gradient); border: none; border-radius: 30px; padding: 6px 12px; cursor: pointer; font-size: 12px; font-weight: bold; color: #1A1A1A; }
        
        .login-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--card-bg); border-radius: 28px; padding: 25px; width: 85%; max-width: 350px; border: 2px solid var(--primary); text-align: center; }
        .login-input { width: 100%; padding: 12px; margin: 8px 0; background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 12px; color: var(--text-color); }
        .login-btn { background: var(--gradient); border: none; padding: 12px; border-radius: 30px; width: 100%; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .error-msg { color: #E53935; font-size: 12px; margin-top: 10px; display: none; }
        
        .slider-container { margin: 12px; position: relative; overflow: hidden; border-radius: 24px; }
        .slider-wrapper { display: flex; transition: transform 0.5s ease; cursor: grab; }
        .slide { min-width: 100%; background: var(--gradient); padding: 20px; text-align: center; color: #1A1A1A; }
        .slide-icon { font-size: 40px; margin-bottom: 5px; }
        .slide-title { font-size: 18px; font-weight: bold; }
        .slider-dots { display: flex; justify-content: center; gap: 8px; padding: 10px; position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.3); }
        .dot { width: 6px; height: 6px; background: rgba(255,255,255,0.5); border-radius: 50%; cursor: pointer; }
        .dot.active { background: white; width: 20px; border-radius: 10px; }
        
        .search-container { padding: 10px 12px; }
        .search-box { display: flex; align-items: center; background: var(--card-bg); border-radius: 50px; padding: 10px 16px; border: 1px solid var(--border-color); }
        .search-box i { color: var(--primary); }
        .search-input { flex: 1; border: none; background: transparent; padding: 0 10px; outline: none; color: var(--text-color); }
        
        .section-title { display: flex; justify-content: space-between; padding: 15px 16px 5px; }
        .section-title h3 { color: var(--primary); font-size: 18px; }
        
        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 10px 16px; }
        .product-card { background: var(--card-bg); border-radius: 16px; padding: 12px; border: 1px solid var(--border-color); cursor: pointer; }
        .product-image { font-size: 40px; text-align: center; }
        .product-title { font-size: 12px; font-weight: bold; text-align: center; margin: 8px 0; }
        .product-price { font-size: 13px; font-weight: bold; color: var(--primary); text-align: center; }
        .product-actions { display: flex; gap: 8px; margin-top: 8px; }
        .product-action-btn { flex: 1; background: var(--gradient); border: none; border-radius: 20px; padding: 5px; font-size: 10px; font-weight: bold; cursor: pointer; }
        
        .cart-summary { background: var(--card-bg); border-radius: 20px; padding: 15px; margin: 12px; }
        .cart-total { font-size: 18px; font-weight: bold; color: var(--primary); text-align: center; margin: 10px 0; }
        .checkout-btn { background: var(--gradient); border: none; padding: 12px; border-radius: 30px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card-bg); display: flex; justify-content: space-around; padding: 8px 12px; border-top: 1px solid var(--border-color); z-index: 100; }
        .nav-item { text-align: center; cursor: pointer; padding: 5px; border-radius: 30px; }
        .nav-item i { font-size: 20px; color: var(--text-dim); }
        .nav-item span { font-size: 9px; color: var(--text-dim); }
        .nav-item.active { background: var(--gradient); }
        .nav-item.active i, .nav-item.active span { color: #1A1A1A; }
        
        .cart-icon { position: relative; }
        .badge { background: var(--primary); color: #1A1A1A; font-size: 9px; border-radius: 50%; width: 16px; height: 16px; display: inline-flex; align-items: center; justify-content: center; position: absolute; top: -5px; right: -8px; }
        
        .toast { position: fixed; bottom: 80px; left: 20px; right: 20px; background: var(--gradient); color: #1A1A1A; padding: 12px; border-radius: 50px; text-align: center; z-index: 1000; animation: fadeOut 2.5s; font-weight: bold; }
        @keyframes fadeOut { 0% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; } }
        .empty-state { text-align: center; padding: 40px; color: var(--text-dim); }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-area"><h1>✨ مكتبة حكايه ✨</h1></div>
    <div class="theme-toggle" id="themeToggleBtn">🌙 ليلي</div>
</div>

<div class="search-container">
    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" class="search-input" id="searchInput" placeholder="ابحث عن منتج...">
    </div>
</div>

<div class="slider-container">
    <div class="slider-wrapper" id="sliderWrapper">
        <div class="slide"><div class="slide-icon">🎉✨</div><div class="slide-title">خصم 30%</div></div>
        <div class="slide"><div class="slide-icon">🚚💨</div><div class="slide-title">توصيل مجاني</div></div>
        <div class="slide"><div class="slide-icon">🎁🎈</div><div class="slide-title">هدايا مع كل طلب</div></div>
    </div>
    <div class="slider-dots" id="sliderDots"></div>
</div>

<div id="homeContent">
    <div class="section-title"><h3>⭐ الأكثر مبيعاً</h3></div>
    <div id="bestSellersGrid" class="products-grid"></div>
    <div class="section-title"><h3>✨ منتجات مميزة</h3></div>
    <div id="featuredGrid" class="products-grid"></div>
</div>

<div id="cartContent" style="display: none;">
    <div class="section-title"><h3>🛒 سلة المشتريات</h3></div>
    <div id="cartItemsGrid" class="products-grid"></div>
    <div class="cart-summary">
        <div class="cart-total" id="cartTotal">المجموع: 0 د.ع</div>
        <button class="checkout-btn" onclick="checkout()">💳 شراء الآن</button>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item active" data-tab="home"><i class="fas fa-home"></i><span>الرئيسية</span></div>
    <div class="nav-item" data-tab="cart"><div class="cart-icon"><i class="fas fa-shopping-cart"></i><span class="badge" id="cartBadge" style="display:none;">0</span></div><span>السلة</span></div>
</div>

<script>
    // ======================= ⚠️ غيّر هذه القيم ⚠️ =======================
    // ضع الـ Gist ID الجديد هنا (من الرابط بعد إنشاء الـ Gist)
    const GIST_ID = "https://gist.github.com/sharktheking/29c912a386122519c2f33862d4fbf698";
    // ضع التوكن الجديد هنا
    const GITHUB_TOKEN = "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";
    // ================================================================
    
    const GIST_URL = `https://api.github.com/gists/${GIST_ID}`;
    const WHATSAPP_NUMBER = "9647757777566";
    
    // المنتجات
    const products = [
        { id: 1, name: "دفتر ملاحظات فاخر", price: 3000, icon: "📓", isBestSeller: true },
        { id: 2, name: "قلم حبر ذهبي", price: 1500, icon: "✒️", isBestSeller: true },
        { id: 3, name: "سكوشي فاخر", price: 5000, oldPrice: 7500, icon: "🧸", isBestSeller: true },
        { id: 4, name: "شاحن سريع 33W", price: 25000, oldPrice: 35000, icon: "⚡", isBestSeller: true }
    ];
    
    // بيانات المستخدم (محلية)
    let users = JSON.parse(localStorage.getItem('hekaya_users')) || [];
    let currentUser = null;
    let cart = [];
    let currentTab = 'home';
    
    if(users.length === 0) {
        users = [{ username: "admin", password: "A1234", fullName: "مدير النظام", phone: "", address: "" }];
        localStorage.setItem('hekaya_users', JSON.stringify(users));
    }
    
    // ======================= حفظ الطلب في GitHub =======================
    async function saveOrderToGithub(order) {
        try {
            // جلب البيانات الحالية
            const response = await fetch(GIST_URL, {
                headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
            });
            
            let allData = { products: [], users: [], orders: [] };
            
            if(response.ok) {
                const data = await response.json();
                if(data.files && data.files['hekaya_data.json']) {
                    allData = JSON.parse(data.files['hekaya_data.json'].content);
                }
            }
            
            // إضافة الطلب الجديد
            if(!allData.orders) allData.orders = [];
            allData.orders.unshift(order);
            allData.lastUpdate = new Date().toISOString();
            
            // حفظ البيانات
            const content = JSON.stringify(allData, null, 2);
            const saveResponse = await fetch(GIST_URL, {
                method: 'PATCH',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    files: { 'hekaya_data.json': { content: content } }
                })
            });
            
            return saveResponse.ok;
        } catch(error) {
            console.error('Error:', error);
            return false;
        }
    }
    
    // ======================= إرسال الطلب =======================
    async function checkout() {
        if(!currentUser) {
            showToast('❌ الرجاء تسجيل الدخول أولاً');
            login();
            return;
        }
        if(cart.length === 0) {
            showToast('🛒 السلة فارغة');
            return;
        }
        
        showToast('🔄 جاري معالجة الطلب...');
        
        const order = {
            orderNumber: `ORD-${Date.now()}`,
            customer: {
                username: currentUser.username,
                fullName: currentUser.fullName || currentUser.username,
                phone: currentUser.phone || 'غير مدخل',
                address: currentUser.address || 'غير مدخل'
            },
            items: cart.map(item => {
                const product = products.find(p => p.id === item.id);
                return { id: item.id, name: item.name, price: item.price, icon: product ? product.icon : '📦' };
            }),
            total: cart.reduce((sum, item) => sum + item.price, 0),
            status: 'جديد',
            date: new Date().toLocaleString('ar-IQ'),
            timestamp: Date.now()
        };
        
        const saved = await saveOrderToGithub(order);
        
        if(saved) {
            cart = [];
            saveUserData();
            updateCartTotal();
            if(currentTab === 'cart') renderCartItems();
            showToast(`✅ تم إرسال الطلب بنجاح! رقم الطلب: ${order.orderNumber}`);
            
            // إرسال واتساب
            const itemsList = order.items.map(item => `• ${item.name}: ${item.price.toLocaleString()} د.ع`).join('\n');
            const msg = encodeURIComponent(`🛒 طلب جديد\n👤 ${order.customer.fullName}\n📞 ${order.customer.phone}\n📍 ${order.customer.address}\n📋 ${itemsList}\n💰 ${order.total.toLocaleString()} د.ع`);
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`, '_blank');
        } else {
            showToast('❌ فشل إرسال الطلب، حاول مرة أخرى');
        }
    }
    
    // ======================= باقي الدوال =======================
    function renderBestSellers() {
        const container = document.getElementById('bestSellersGrid');
        container.innerHTML = products.filter(p => p.isBestSeller).map(p => `
            <div class="product-card" onclick="showProductDetail(${p.id})">
                <div class="product-image">${p.icon}</div>
                <div class="product-title">${p.name}</div>
                <div class="product-price">${p.price.toLocaleString()} د.ع</div>
                <div class="product-actions">
                    <button class="product-action-btn" onclick="event.stopPropagation(); addToCart(${p.id})">🛒</button>
                </div>
            </div>
        `).join('');
    }
    
    function renderFeatured() {
        const container = document.getElementById('featuredGrid');
        container.innerHTML = products.filter(p => p.oldPrice).map(p => `
            <div class="product-card" onclick="showProductDetail(${p.id})">
                <div class="product-image">${p.icon}</div>
                <div class="product-title">${p.name}</div>
                <div class="product-price">${p.price.toLocaleString()} د.ع</div>
                <div class="product-actions">
                    <button class="product-action-btn" onclick="event.stopPropagation(); addToCart(${p.id})">🛒</button>
                </div>
            </div>
        `).join('');
    }
    
    function renderCartItems() {
        const container = document.getElementById('cartItemsGrid');
        if(cart.length === 0) { container.innerHTML = '<div class="empty-state">🛒 السلة فارغة</div>'; updateCartTotal(); return; }
        container.innerHTML = cart.map(item => {
            const p = products.find(p => p.id === item.id);
            return `<div class="product-card">
                <div class="product-image">${p.icon}</div>
                <div class="product-title">${p.name}</div>
                <div class="product-price">${p.price.toLocaleString()} د.ع</div>
                <button class="product-action-btn" onclick="removeFromCart(${p.id})">🗑️ حذف</button>
            </div>`;
        }).join('');
        updateCartTotal();
    }
    
    function updateCartTotal() {
        const total = document.getElementById('cartTotal');
        const badge = document.getElementById('cartBadge');
        const sum = cart.reduce((s, item) => s + item.price, 0);
        if(total) total.innerHTML = `المجموع: ${sum.toLocaleString()} د.ع`;
        if(cart.length > 0) { badge.style.display = 'inline-flex'; badge.innerText = cart.length; }
        else badge.style.display = 'none';
    }
    
    function addToCart(productId) {
        if(!currentUser) { showToast('❌ الرجاء تسجيل الدخول أولاً'); login(); return; }
        const product = products.find(p => p.id === productId);
        if(!cart.find(item => item.id === productId)) {
            cart.push({ id: product.id, name: product.name, price: product.price });
            saveUserData();
            updateCartTotal();
            showToast(`✅ تم إضافة ${product.name} إلى السلة`);
        } else { showToast(`⚠️ ${product.name} موجود بالفعل`); }
    }
    
    function removeFromCart(productId) {
        cart = cart.filter(item => item.id !== productId);
        saveUserData();
        updateCartTotal();
        if(currentTab === 'cart') renderCartItems();
        showToast(`🗑️ تم إزالة المنتج من السلة`);
    }
    
    function showProductDetail(id) {
        const p = products.find(p => p.id === id);
        alert(`${p.name}\nالسعر: ${p.price.toLocaleString()} د.ع`);
    }
    
    function checkLoginStatus() {
        const saved = localStorage.getItem('hekaya_current_user');
        if(saved) {
            currentUser = JSON.parse(saved);
            document.getElementById('loginOverlay')?.remove();
            loadUserData();
            return true;
        }
        login();
        return false;
    }
    
    function login() {
        const username = prompt('👤 اسم المستخدم:');
        const password = prompt('🔑 كلمة المرور:');
        const user = users.find(u => u.username === username && u.password === password);
        if(user) {
            currentUser = user;
            localStorage.setItem('hekaya_current_user', JSON.stringify(currentUser));
            loadUserData();
            showToast(`✅ مرحباً ${user.fullName || username}`);
            if(document.getElementById('loginOverlay')) document.getElementById('loginOverlay').remove();
        } else {
            alert('❌ اسم المستخدم أو كلمة المرور غير صحيحة');
            login();
        }
    }
    
    function saveUserData() {
        if(currentUser) {
            localStorage.setItem(`cart_${currentUser.username}`, JSON.stringify(cart));
        }
    }
    
    function loadUserData() {
        const savedCart = localStorage.getItem(`cart_${currentUser.username}`);
        cart = savedCart ? JSON.parse(savedCart) : [];
        updateCartTotal();
    }
    
    // السلايدر
    let currentSlide = 0;
    const sliderWrapper = document.getElementById('sliderWrapper');
    const slides = document.querySelectorAll('.slide');
    
    function initSlider() {
        for(let i=0; i<slides.length; i++) {
            const dot = document.createElement('div');
            dot.classList.add('dot');
            dot.onclick = () => goToSlide(i);
            document.getElementById('sliderDots').appendChild(dot);
        }
        goToSlide(0);
        setInterval(() => goToSlide(currentSlide+1), 5000);
        
        let startX;
        sliderWrapper.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; });
        sliderWrapper.addEventListener('touchend', (e) => {
            let diff = e.changedTouches[0].clientX - startX;
            if(Math.abs(diff) > 50) goToSlide(diff > 0 ? currentSlide-1 : currentSlide+1);
        });
    }
    
    function goToSlide(index) {
        currentSlide = (index + slides.length) % slides.length;
        sliderWrapper.style.transform = `translateX(-${currentSlide * 100}%)`;
        document.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i===currentSlide));
    }
    
    // الثيم
    function loadTheme() {
        if(localStorage.getItem('hekaya_theme') === 'dark') {
            document.body.classList.add('dark');
            document.getElementById('themeToggleBtn').innerHTML = '☀️ نهاري';
        }
    }
    
    function toggleTheme() {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        localStorage.setItem('hekaya_theme', isDark ? 'dark' : 'light');
        document.getElementById('themeToggleBtn').innerHTML = isDark ? '☀️ نهاري' : '🌙 ليلي';
    }
    
    function setActiveTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.nav-item').forEach(item => {
            if(item.dataset.tab === tab) item.classList.add('active');
            else item.classList.remove('active');
        });
        document.getElementById('homeContent').style.display = 'none';
        document.getElementById('cartContent').style.display = 'none';
        if(tab === 'home') document.getElementById('homeContent').style.display = 'block';
        else if(tab === 'cart') { document.getElementById('cartContent').style.display = 'block'; renderCartItems(); }
    }
    
    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }
    
    // البحث
    document.getElementById('searchInput').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        if(term) {
            const found = products.filter(p => p.name.toLowerCase().includes(term));
            showToast(`🔍 تم العثور على ${found.length} منتج`);
        }
    });
    
    // الأحداث
    document.querySelectorAll('.nav-item').forEach(item => item.addEventListener('click', () => setActiveTab(item.dataset.tab)));
    document.getElementById('themeToggleBtn').onclick = toggleTheme;
    
    // جعل الدوال عامة
    window.addToCart = addToCart;
    window.checkout = checkout;
    window.setActiveTab = setActiveTab;
    
    // التشغيل
    renderBestSellers();
    renderFeatured();
    initSlider();
    loadTheme();
    checkLoginStatus();
</script>
</body>
</html>
