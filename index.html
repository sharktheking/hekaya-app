<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>مكتبة حكايه | المتجر</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-color: #0A0A0A;
            --card-color: #1A1A1A;
            --text-color: #FFFFFF;
            --text-dim: #B0B0B0;
            --gold: #FFD700;
            --gold-dark: #DAA520;
            --border-color: #333;
            --success: #4CAF50;
            --error: #E53935;
            --discount: #FF4444;
        }

        body.light-theme {
            --bg-color: #F5F5F5;
            --card-color: #FFFFFF;
            --text-color: #1A1A1A;
            --text-dim: #666666;
            --gold: #DAA520;
            --gold-dark: #B8860B;
            --border-color: #E0E0E0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            transition: all 0.3s ease;
            padding-bottom: 70px;
        }

        /* Header */
        .header {
            background: var(--card-color);
            padding: 12px 16px;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .app-logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
        }

        .app-title h1 {
            font-size: 18px;
            color: var(--gold);
        }

        .app-title p {
            font-size: 9px;
            color: var(--text-dim);
        }

        .theme-toggle {
            background: var(--bg-color);
            padding: 6px 12px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            border: 1px solid var(--border-color);
        }

        /* Contact Bar */
        .contact-bar {
            display: flex;
            gap: 6px;
            justify-content: center;
            padding: 8px;
            background: var(--card-color);
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
        }

        .contact-btn {
            padding: 5px 10px;
            border-radius: 25px;
            text-decoration: none;
            color: white;
            font-size: 11px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .contact-btn:active { transform: scale(0.95); }
        .whatsapp { background: #25D366; }
        .telegram { background: #0088cc; }
        .call { background: #E53935; }
        .instagram { background: #E4405F; }
        .facebook { background: #1877F2; }
        .tiktok { background: #000000; }

        /* Search */
        .search-container {
            padding: 10px 12px;
        }
        .search-box {
            display: flex;
            align-items: center;
            background: var(--card-color);
            border-radius: 30px;
            padding: 8px 15px;
            border: 1px solid var(--border-color);
        }
        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-color);
            font-size: 13px;
            outline: none;
        }
        .clear-btn {
            background: var(--border-color);
            border: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            cursor: pointer;
            display: none;
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 12px;
        }
        .product-card {
            background: var(--card-color);
            border-radius: 16px;
            padding: 12px;
            border: 1px solid var(--border-color);
            transition: transform 0.2s;
            position: relative;
        }
        .product-card:active { transform: scale(0.98); }
        
        .discount-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: var(--discount);
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 20px;
        }
        
        .product-icon {
            font-size: 40px;
            text-align: center;
            display: block;
        }
        .product-name {
            font-size: 13px;
            font-weight: bold;
            margin: 8px 0 4px;
            text-align: center;
        }
        .product-price {
            color: var(--gold);
            font-size: 14px;
            font-weight: bold;
            text-align: center;
        }
        .old-price {
            color: var(--text-dim);
            font-size: 11px;
            text-decoration: line-through;
            margin-right: 5px;
        }
        .product-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .action-btn {
            flex: 1;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 25px;
            padding: 6px;
            font-size: 12px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }
        .action-btn:active { transform: scale(0.95); }
        .fav-active { background: var(--error); color: white; border-color: var(--error); }
        .cart-active { background: var(--gold); color: #0A0A0A; border-color: var(--gold); }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card-color);
            display: flex;
            justify-content: space-around;
            padding: 8px 12px;
            border-top: 1px solid var(--border-color);
            z-index: 100;
        }
        .nav-item {
            flex: 1;
            text-align: center;
            padding: 6px;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.2s;
            font-size: 12px;
        }
        .nav-item.active {
            background: var(--gold);
            color: #0A0A0A;
            font-weight: bold;
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 80px;
            left: 10px;
            right: 10px;
            background: var(--success);
            color: white;
            padding: 10px;
            border-radius: 30px;
            text-align: center;
            z-index: 200;
            animation: slideDown 0.3s ease;
            font-size: 12px;
        }
        .notification.discount {
            background: var(--discount);
        }
        @keyframes slideDown {
            from { transform: translateY(-100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-dim);
        }

        .footer {
            text-align: center;
            padding: 15px;
            font-size: 10px;
            color: var(--text-dim);
            border-top: 1px solid var(--border-color);
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-area">
        <div class="app-logo">ح</div>
        <div class="app-title">
            <h1>مكتبة حكايه</h1>
            <p>متجر الإلكترونيات</p>
        </div>
    </div>
    <div class="theme-toggle" id="themeToggle">🌙</div>
</div>

<div class="contact-bar">
    <div class="contact-btn whatsapp" onclick="contactWhatsApp()">واتساب</div>
    <div class="contact-btn telegram" onclick="contactTelegram()">تيليجرام</div>
    <div class="contact-btn call" onclick="contactCall()">اتصال</div>
    <div class="contact-btn instagram" onclick="contactInstagram()">انستقرام</div>
    <div class="contact-btn facebook" onclick="contactFacebook()">فيسبوك</div>
    <div class="contact-btn tiktok" onclick="contactTikTok()">تيك توك</div>
</div>

<div class="search-container">
    <div class="search-box">
        <input type="text" class="search-input" id="searchInput" placeholder="ابحث عن منتج...">
        <button class="clear-btn" id="clearBtn">✖</button>
    </div>
</div>

<div id="productsContainer" class="products-grid"></div>

<div class="bottom-nav">
    <div class="nav-item active" data-tab="all">الكل</div>
    <div class="nav-item" data-tab="favorites">المفضلة</div>
    <div class="nav-item" data-tab="cart">السلة</div>
</div>

<div class="footer">
    <p>مكتبة حكايه - جميع الحقوق محفوظة</p>
    <p>📍 كوت - حي الحكيم الاولى</p>
</div>

<script>
    // ----------------------------- DATA -----------------------------
    const PRODUCTS_DATA = [
        { id: 1, name: "شاحن سريع 33W", price: 25000, oldPrice: 35000, icon: "⚡", category: "charger" },
        { id: 2, name: "شاحن سيارة 45W", price: 20000, oldPrice: null, icon: "🚗", category: "charger" },
        { id: 3, name: "شاحن لاسلكي 15W", price: 30000, oldPrice: 45000, icon: "🔄", category: "charger" },
        { id: 4, name: "سماعة بلوتوث TWS", price: 25000, oldPrice: null, icon: "🎧", category: "audio" },
        { id: 5, name: "سماعة رأس لاسلكية", price: 50000, oldPrice: 75000, icon: "🎧", category: "audio" },
        { id: 6, name: "جراب سيليكون", price: 8000, oldPrice: null, icon: "📱", category: "case" },
        { id: 7, name: "جراب حماية قوي", price: 20000, oldPrice: 30000, icon: "🛡️", category: "case" },
        { id: 8, name: "حامل سيارة", price: 15000, oldPrice: null, icon: "🚗", category: "mount" },
        { id: 9, name: "كابل USB-C 2م", price: 8000, oldPrice: null, icon: "🔌", category: "cable" },
        { id: 10, name: "كابل Lightning", price: 10000, oldPrice: 15000, icon: "🔌", category: "cable" },
        { id: 11, name: "باور بانك 10000mAh", price: 35000, oldPrice: null, icon: "🔋", category: "powerbank" },
        { id: 12, name: "باور بانك 20000mAh", price: 55000, oldPrice: 80000, icon: "🔋", category: "powerbank" }
    ];

    // ----------------------------- STATE -----------------------------
    let cart = JSON.parse(localStorage.getItem('hekaya_cart')) || [];
    let favorites = JSON.parse(localStorage.getItem('hekaya_favorites')) || [];
    let currentTab = 'all';
    let searchQuery = '';

    // ----------------------------- DOM Elements -----------------------------
    const productsContainer = document.getElementById('productsContainer');
    const searchInput = document.getElementById('searchInput');
    const clearBtn = document.getElementById('clearBtn');
    const themeToggle = document.getElementById('themeToggle');

    // ----------------------------- Helper Functions -----------------------------
    function showNotification(message, isDiscount = false) {
        const existing = document.querySelector('.notification');
        if(existing) existing.remove();
        
        const notif = document.createElement('div');
        notif.className = 'notification' + (isDiscount ? ' discount' : '');
        notif.innerText = message;
        document.body.appendChild(notif);
        setTimeout(() => notif.remove(), 2500);
    }

    function saveToLocalStorage() {
        localStorage.setItem('hekaya_cart', JSON.stringify(cart));
        localStorage.setItem('hekaya_favorites', JSON.stringify(favorites));
    }

    function isInCart(productId) { return cart.some(item => item.id === productId); }
    function isInFavorites(productId) { return favorites.includes(productId); }

    function addToCart(product) {
        if (!isInCart(product.id)) {
            cart.push({ id: product.id, name: product.name, price: product.price });
            saveToLocalStorage();
            showNotification(`تمت إضافة ${product.name} إلى السلة`);
            renderProducts();
        } else {
            showNotification(`${product.name} موجود بالفعل في السلة`);
        }
    }

    function removeFromCart(productId) {
        cart = cart.filter(item => item.id !== productId);
        saveToLocalStorage();
        showNotification(`تم إزالة المنتج من السلة`);
        if(currentTab === 'cart') renderProducts();
        else renderProducts();
    }

    function toggleFavorite(productId) {
        if (isInFavorites(productId)) {
            favorites = favorites.filter(id => id !== productId);
            showNotification(`تم إزالة من المفضلة`);
        } else {
            favorites.push(productId);
            showNotification(`تمت إضافة إلى المفضلة`);
        }
        saveToLocalStorage();
        renderProducts();
    }

    function getFilteredProducts() {
        let filtered = [...PRODUCTS_DATA];
        
        if (searchQuery) {
            filtered = filtered.filter(p => p.name.includes(searchQuery));
        }
        
        if (currentTab === 'favorites') {
            filtered = filtered.filter(p => favorites.includes(p.id));
        } else if (currentTab === 'cart') {
            filtered = cart.map(c => PRODUCTS_DATA.find(p => p.id === c.id)).filter(p => p);
        }
        
        return filtered;
    }

    // ----------------------------- Rendering -----------------------------
    function renderProducts() {
        const products = getFilteredProducts();
        
        if (products.length === 0) {
            productsContainer.innerHTML = `<div class="empty-state">لا توجد منتجات</div>`;
            return;
        }
        
        productsContainer.innerHTML = products.map(product => {
            const inCart = isInCart(product.id);
            const inFav = isInFavorites(product.id);
            const hasDiscount = product.oldPrice && product.oldPrice > product.price;
            
            return `
                <div class="product-card">
                    ${hasDiscount ? `<div class="discount-badge">عرض حار</div>` : ''}
                    <span class="product-icon">${product.icon}</span>
                    <div class="product-name">${product.name}</div>
                    <div class="product-price">
                        ${hasDiscount ? `<span class="old-price">${product.oldPrice.toLocaleString()} د.ع</span>` : ''}
                        ${product.price.toLocaleString()} د.ع
                    </div>
                    <div class="product-actions">
                        <div class="action-btn ${inFav ? 'fav-active' : ''}" onclick="toggleFavorite(${product.id})">${inFav ? '★ مفضلة' : '☆ مفضلة'}</div>
                        ${currentTab === 'cart' 
                            ? `<div class="action-btn" style="background:var(--error); color:white;" onclick="removeFromCart(${product.id})">🗑 حذف</div>`
                            : `<div class="action-btn ${inCart ? 'cart-active' : ''}" onclick="${inCart ? `removeFromCart(${product.id})` : `addToCart(${JSON.stringify(product).replace(/"/g, '&quot;')})`}">${inCart ? '✓ في السلة' : '➕ سلة'}</div>`
                        }
                    </div>
                </div>
            `;
        }).join('');
    }

    // ----------------------------- Search -----------------------------
    searchInput.addEventListener('input', (e) => {
        searchQuery = e.target.value;
        clearBtn.style.display = searchQuery ? 'block' : 'none';
        renderProducts();
    });
    clearBtn.addEventListener('click', () => {
        searchInput.value = '';
        searchQuery = '';
        clearBtn.style.display = 'none';
        renderProducts();
    });

    // ----------------------------- Bottom Navigation -----------------------------
    function setActiveTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.nav-item').forEach(item => {
            if(item.dataset.tab === tab) item.classList.add('active');
            else item.classList.remove('active');
        });
        renderProducts();
    }
    
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => setActiveTab(item.dataset.tab));
    });

    // ----------------------------- Contact Functions -----------------------------
    function contactWhatsApp() { window.open('https://wa.me/9647757777566', '_blank'); }
    function contactTelegram() { window.open('https://t.me/hikaya_b', '_blank'); }
    function contactCall() { window.open('tel:07757777566', '_blank'); }
    function contactInstagram() { window.open('https://instagram.com/hikaya', '_blank'); }
    function contactFacebook() { window.open('https://facebook.com/hikaya', '_blank'); }
    function contactTikTok() { window.open('https://tiktok.com/@hikaya', '_blank'); }

    // Expose functions to global scope for onclick
    window.toggleFavorite = toggleFavorite;
    window.addToCart = addToCart;
    window.removeFromCart = removeFromCart;
    window.contactWhatsApp = contactWhatsApp;
    window.contactTelegram = contactTelegram;
    window.contactCall = contactCall;
    window.contactInstagram = contactInstagram;
    window.contactFacebook = contactFacebook;
    window.contactTikTok = contactTikTok;

    // ----------------------------- Theme -----------------------------
    function initTheme() {
        const saved = localStorage.getItem('theme');
        if (saved === 'light') {
            document.body.classList.add('light-theme');
            themeToggle.innerHTML = '☀️';
        } else {
            themeToggle.innerHTML = '🌙';
        }
    }
    themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('light-theme');
        const isLight = document.body.classList.contains('light-theme');
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
        themeToggle.innerHTML = isLight ? '☀️' : '🌙';
    });

    // ----------------------------- Initialization -----------------------------
    function showWelcomeDiscount() {
        setTimeout(() => {
            showNotification('🔥 خصم 20% على الشواحن السريعة - لفترة محدودة!', true);
        }, 1000);
        setTimeout(() => {
            showNotification('🎉 توصيل مجاني للطلبات فوق 50,000 دينار عراقي');
        }, 4000);
    }
    
    initTheme();
    renderProducts();
    showWelcomeDiscount();
</script>
</body>
</html>
